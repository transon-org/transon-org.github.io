<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Transon is a homogeneous JSON-to-JSON template engine: write templates in pure JSON and transform data with composable rules. Try it live in the browser playground."
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Transon" />
    <meta property="og:url" content="https://transon-org.github.io/" />
    <meta property="og:title" content="Transon — homogeneous JSON-to-JSON template engine & playground" />
    <meta property="og:description" content="Write templates in pure JSON and transform data with composable rules. Try it live in the browser playground." />
    <meta property="og:image" content="https://transon-org.github.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Transon — homogeneous JSON-to-JSON template engine" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Transon — homogeneous JSON-to-JSON template engine & playground" />
    <meta name="twitter:description" content="Write templates in pure JSON and transform data with composable rules. Try it live in the browser playground." />
    <meta name="twitter:image" content="https://transon-org.github.io/og-image.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css" integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://pyscript.net/releases/2023.03.1/pyscript.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <script defer src="https://pyscript.net/releases/2023.03.1/pyscript.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
    <base href="%PUBLIC_URL%/">
    <py-config src="./config.toml"></py-config>
    <py-script src="./script.py"></py-script>
    <script>
      function transform(template, data) {
        return pyscript.interpreter.globals.get('transform')(template, data);
      }
    </script>
    <title>Transon — homogeneous JSON-to-JSON template engine & playground</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <a href="https://github.com/transon-org/transon" style="position: absolute; top:0; right: 0;">
      <img decoding="async" loading="lazy" width="149" height="149" src="https://github.blog/wp-content/uploads/2008/12/forkme_right_gray_6d6d6d.png?resize=149%2C149" class="attachment-full size-full" alt="Fork me on GitHub" data-recalc-dims="1">
    </a>
  </body>
</html>
